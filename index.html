<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1208">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Records">
<title>My Records</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0b06;
    --bg2: #1a1208;
    --bg3: #251a0d;
    --bg4: #2f2010;
    --gold: #c9a55a;
    --gold2: #e8c97a;
    --gold3: #a07d38;
    --text: #f0e6d0;
    --text2: #b8a882;
    --text3: #7a6a4a;
    --border: rgba(201,165,90,0.15);
    --border2: rgba(201,165,90,0.3);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }
  
  /* HEADER */
  .header { background: var(--bg2); border-bottom: 0.5px solid var(--border2); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--gold2); letter-spacing: 0.5px; }
  .header-date { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* TABS */
  .tabs { display: flex; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 13px 4px 11px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-left: none; border-right: none; border-top: none; font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.2px; }
  .tab.active { color: var(--gold2); border-bottom-color: var(--gold); }
  .tab-icon { font-size: 16px; display: block; margin-bottom: 3px; }

  /* CONTENT */
  .content { padding: 16px; padding-bottom: 32px; }
  .add-btn { width: 100%; padding: 14px; background: transparent; border: 0.5px dashed var(--border2); border-radius: var(--radius); font-size: 13px; color: var(--gold3); cursor: pointer; margin-bottom: 16px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .add-btn:active { background: var(--bg3); }
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; line-height: 2; }
  .empty-icon { font-size: 40px; display: block; margin-bottom: 12px; opacity: 0.5; }

  /* RECORD LIST */
  .record-list { display: flex; flex-direction: column; gap: 12px; }
  .record-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .record-img-wrap { width: 100%; height: 180px; background: var(--bg3); position: relative; cursor: pointer; overflow: hidden; }
  .record-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .img-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); font-size: 13px; }
  .img-placeholder svg { opacity: 0.3; }
  .img-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); border: 0.5px solid var(--border2); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--gold3); }
  .record-body { padding: 14px; }
  .record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .record-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text); flex: 1; }
  .record-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 0 0 0 8px; line-height: 1; }
  
  /* STARS */
  .stars { display: flex; gap: 3px; margin-bottom: 14px; }
  .star { font-size: 20px; cursor: pointer; color: var(--bg4); transition: color 0.1s; line-height: 1; }
  .star.on { color: var(--gold); }

  /* NPF */
  .npf-section { display: flex; flex-direction: column; gap: 12px; }
  .npf-block {}
  .npf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .npf-label { font-size: 10px; font-weight: 500; color: var(--gold3); text-transform: uppercase; letter-spacing: 1px; }
  .manage-link { font-size: 11px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: 'Noto Sans KR', sans-serif; padding: 0; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg3); color: var(--text3); transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
  .tag:active { opacity: 0.7; }
  .tag.sel-n { background: rgba(59,93,153,0.2); border-color: rgba(100,140,220,0.4); color: #8eb4f0; }
  .tag.sel-p { background: rgba(46,100,50,0.2); border-color: rgba(80,160,80,0.4); color: #82c882; }
  .tag.sel-f { background: rgba(150,100,20,0.2); border-color: rgba(201,165,90,0.4); color: var(--gold2); }

  /* MEMO */
  .memo { width: 100%; margin-top: 12px; padding: 10px 12px; font-size: 13px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); resize: none; color: var(--text); font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; }
  .memo::placeholder { color: var(--text3); }
  
  /* DATE */
  .record-date { font-size: 11px; color: var(--text3); margin-top: 10px; text-align: right; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .modal-bg.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; border-top: 0.5px solid var(--border2); padding: 20px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; transform: translateY(40px); transition: transform 0.25s; }
  .modal-bg.show .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold2); margin-bottom: 16px; }
  .modal input { width: 100%; padding: 12px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg3); color: var(--text); margin-bottom: 12px; font-family: 'Noto Sans KR', sans-serif; }
  .modal input::placeholder { color: var(--text3); }
  .modal input:focus { outline: none; border-color: var(--gold3); }
  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .btn-gold { flex: 1; padding: 13px; background: var(--gold3); border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; color: var(--bg); font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: background 0.15s; }
  .btn-gold:active { background: var(--gold); }
  .btn-ghost { flex: 1; padding: 13px; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; color: var(--text3); font-family: 'Noto Sans KR', sans-serif; }

  /* MANAGE TAGS */
  .manage-box { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 14px; }
  .manage-box-label { font-size: 10px; color: var(--gold3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
  .manage-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .manage-tag { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; font-size: 12px; background: var(--bg2); border: 0.5px solid var(--border2); color: var(--text2); font-family: 'Noto Sans KR', sans-serif; }
  .manage-tag-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; margin-top: 1px; }

  /* DIVIDER */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>My Records</h1>
  </div>
  <div class="header-date" id="today-date"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('whisky')">
    <span class="tab-icon">🥃</span>위스키
  </button>
  <button class="tab" onclick="switchTab('cigar')">
    <span class="tab-icon">🍃</span>시가
  </button>
  <button class="tab" onclick="switchTab('restaurant')">
    <span class="tab-icon">🍽</span>맛집
  </button>
</div>

<div class="content" id="content"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-inner"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
const STORE_KEY = 'myrecords_v2';
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    tab: 'whisky',
    records: { whisky: [], cigar: [], restaurant: [] },
    npf: {
      whisky:     { n: ['초콜릿','바닐라','피트','꿀','오크','시트러스','체리'], p: ['스파이시','스모키','우디','플로럴','과일향','견과류'], f: ['롱','드라이','스위트','미디엄','웜'] },
      cigar:      { n: ['흙','가죽','커피','초콜릿','허브','삼나무'], p: ['크리미','스파이시','우디','너티','달콤함'], f: ['스무스','드라이','풀바디','미디엄','짧음'] },
      restaurant: { n: ['감칠맛','단맛','짠맛','신맛','매운맛','고소함'], p: ['바삭함','부드러움','쫄깃함','촉촉함','담백함'], f: ['깔끔함','진함','풍부함','가벼움'] }
    }
  };
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── LABELS ─────────────────────────────────────────────────────
const LAB = {
  whisky:     { title: '위스키',  n: 'Nose',  p: 'Palate', f: 'Finish' },
  cigar:      { title: '시가',    n: 'Nose',  p: 'Palate', f: 'Finish' },
  restaurant: { title: '맛집',    n: '맛',    p: '분위기',  f: '가성비' }
};

// ── DATE ───────────────────────────────────────────────────────
function setDate() {
  const d = new Date();
  document.getElementById('today-date').textContent =
    d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
setDate();

// ── SWITCH TAB ─────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['whisky','cigar','restaurant'][i] === tab);
  });
  render();
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const tab = state.tab;
  const records = state.records[tab];
  const lab = LAB[tab];
  let html = `<button class="add-btn" onclick="openAdd()">＋ 새 ${lab.title} 기록 추가</button>`;
  if (!records.length) {
    html += `<div class="empty"><span class="empty-icon">${{whisky:'🥃',cigar:'🍃',restaurant:'🍽'}[tab]}</span>아직 기록이 없어요.<br>첫 번째 ${lab.title}을 기록해보세요.</div>`;
  } else {
    html += `<div class="record-list">` + records.map((r,i) => cardHTML(r,i,tab,lab)).join('') + `</div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function cardHTML(r, idx, tab, lab) {
  const npf = state.npf[tab];
  const stars = [1,2,3,4,5].map(s =>
    `<span class="star${r.rating>=s?' on':''}" onclick="setRating(${idx},${s})">★</span>`
  ).join('');

  const imgHTML = r.img
    ? `<img src="${r.img}" /><span class="img-overlay">사진 변경</span>`
    : `<div class="img-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>탭하여 사진 추가</span></div>`;

  const tagsHTML = (type) => npf[type].map(t => {
    const sel = r[type] && r[type].includes(t);
    return `<span class="tag${sel?' sel-'+type:''}" onclick="toggleTag(${idx},'${type}','${t}')">${t}</span>`;
  }).join('');

  return `<div class="record-card" id="card-${idx}">
    <div class="record-img-wrap" onclick="uploadImg(${idx})">${imgHTML}</div>
    <input type="file" id="img-${idx}" accept="image/*" style="display:none" onchange="handleImg(event,${idx})">
    <div class="record-body">
      <div class="record-header">
        <div class="record-name">${r.name}</div>
        <button class="record-delete" onclick="deleteRecord(${idx})" title="삭제">×</button>
      </div>
      <div class="stars">${stars}</div>
      <div class="npf-section">
        ${['n','p','f'].map(type => `
          <div class="npf-block">
            <div class="npf-header">
              <span class="npf-label">${lab[type]}</span>
              <button class="manage-link" onclick="openManage('${type}')">항목 편집</button>
            </div>
            <div class="tags">${tagsHTML(type)}</div>
          </div>
        `).join('')}
      </div>
      <textarea class="memo" rows="2" placeholder="메모..." onchange="updateMemo(${idx},this.value)">${r.memo||''}</textarea>
      <div class="record-date">${r.date||''}</div>
    </div>
  </div>`;
}

// ── ACTIONS ────────────────────────────────────────────────────
function uploadImg(idx) { document.getElementById('img-'+idx).click(); }

function handleImg(e, idx) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.records[state.tab][idx].img = ev.target.result;
    save(); render();
  };
  reader.readAsDataURL(file);
}

function toggleTag(idx, type, tag) {
  const r = state.records[state.tab][idx];
  if (!r[type]) r[type] = [];
  const i = r[type].indexOf(tag);
  if (i === -1) r[type].push(tag); else r[type].splice(i,1);
  save(); render();
}

function setRating(idx, val) {
  state.records[state.tab][idx].rating = val;
  save(); render();
}

function updateMemo(idx, val) {
  state.records[state.tab][idx].memo = val;
  save();
}

function deleteRecord(idx) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  state.records[state.tab].splice(idx,1);
  save(); render();
}

// ── MODAL ──────────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target.id==='modal-bg') closeModal(); });

function openAdd() {
  const lab = LAB[state.tab];
  showModal(`
    <h3>새 ${lab.title} 추가</h3>
    <input id="add-name" placeholder="${lab.title} 이름을 입력하세요" autofocus />
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-gold" onclick="addRecord()">추가하기</button>
    </div>
  `);
  setTimeout(() => document.getElementById('add-name')?.focus(), 100);
}

function addRecord() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) return;
  const now = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
  state.records[state.tab].push({ name, rating:0, n:[], p:[], f:[], memo:'', img:null, date:now });
  save(); closeModal(); render();
}

function openManage(type) {
  const lab = LAB[state.tab];
  renderManage(type, lab[type]);
}

function renderManage(type, typeLabel) {
  const items = state.npf[state.tab][type];
  const tagList = items.map((t,i) =>
    `<span class="manage-tag">${t}<button class="manage-tag-del" onclick="removeTag('${type}',${i})">×</button></span>`
  ).join('');
  showModal(`
    <h3>${typeLabel} 항목 편집</h3>
    <div class="manage-box">
      <span class="manage-box-label">현재 항목</span>
      <div class="manage-tags">${tagList || '<span style="color:var(--text3);font-size:13px">항목 없음</span>'}</div>
    </div>
    <input id="new-tag" placeholder="새 항목 추가..." />
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn-gold" onclick="addTagItem('${type}')">추가</button>
    </div>
  `);
  setTimeout(() => document.getElementById('new-tag')?.focus(), 100);
}

function addTagItem(type) {
  const val = document.getElementById('new-tag').value.trim();
  if (!val) return;
  state.npf[state.tab][type].push(val);
  save();
  const lab = LAB[state.tab];
  renderManage(type, lab[type]);
  render();
}

function removeTag(type, idx) {
  state.npf[state.tab][type].splice(idx,1);
  save();
  const lab = LAB[state.tab];
  renderManage(type, lab[type]);
  render();
}

// ── ENTER KEY ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('add-name') === document.activeElement) addRecord();
    if (document.getElementById('new-tag') === document.activeElement) {
      const type = document.querySelector('.btn-gold[onclick]')?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
      if (type) addTagItem(type);
    }
  }
  if (e.key === 'Escape') closeModal();
});

// ── SW ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

render();
</script>
</body>
</html>
